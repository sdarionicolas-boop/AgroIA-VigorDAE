version: '3.8'

services:

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    image: agroia-backend:latest
    container_name: agroia-api
    command: uvicorn src.api.main:app --host 0.0.0.0 --port 8000
    ports:
      - "8000:8000"
    volumes:
      - ./datos:/app/datos
      - ./resultados:/app/resultados
    env_file:
      - .env
    restart: always
    healthcheck:
      # Llama a /health y espera HTTP 200 antes de marcar el servicio como "healthy"
      # El lifespan de FastAPI puede tardar ~10s cargando el DataCube en memoria
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s      # chequea cada 10 segundos
      timeout: 5s        # falla si no responde en 5s
      retries: 6         # hasta 60s de espera total antes de marcar unhealthy
      start_period: 15s  # no penaliza fallos durante los primeros 15s de arranque

  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    image: agroia-frontend:latest
    container_name: agroia-web
    command: streamlit run web/app.py --server.port 8501 --server.address 0.0.0.0
    ports:
      - "8501:8501"
    depends_on:
      backend:
        condition: service_healthy   # espera el healthcheck, no solo el arranque
    environment:
      - API_URL=http://backend:8000
    restart: always
